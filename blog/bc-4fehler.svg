<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Brand gradient for accent bar: teal → violet → purple -->
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#61D2CE"/>
      <stop offset="55%" stop-color="#8719E1"/>
      <stop offset="100%" stop-color="#590DA0"/>
    </linearGradient>
    <!-- Card drop shadow -->
    <filter id="cs" x="-6%" y="-6%" width="112%" height="118%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#1A1A2E" flood-opacity="0.09"/>
    </filter>
    <!-- Clip paths to round only top corners of header band -->
    <clipPath id="c1"><rect x="75" y="84" width="240" height="300" rx="12"/></clipPath>
    <clipPath id="c2"><rect x="345" y="84" width="240" height="300" rx="12"/></clipPath>
    <clipPath id="c3"><rect x="615" y="84" width="240" height="300" rx="12"/></clipPath>
    <clipPath id="c4"><rect x="885" y="84" width="240" height="300" rx="12"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F8F7FF" rx="12"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="26" font-weight="700" fill="#1A1A2E">4 Fehler, die BC-Pläne im Ernstfall wertlos machen</text>

  <!-- Brand gradient accent bar -->
  <rect x="0" y="64" width="1200" height="6" fill="url(#hdr)"/>

  <!-- ═══════════════════════════════════════════════
       CARD 1: Plan liegt ungelesen im SharePoint
       ═══════════════════════════════════════════════ -->
  <!-- Card base with tinted fill and shadow -->
  <rect x="75" y="84" width="240" height="300" rx="12" fill="#F9F5FF" stroke="#590DA0" stroke-width="1.5" filter="url(#cs)"/>
  <!-- Header band (purple) -->
  <rect x="75" y="84" width="240" height="52" fill="#590DA0" clip-path="url(#c1)"/>
  <!-- Number badge -->
  <circle cx="195" cy="110" r="20" fill="#1A1A2E"/>
  <text x="195" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text>

  <!-- Document + Zzz icon -->
  <rect x="162" y="152" width="48" height="56" rx="4" fill="#EDE2FF" stroke="#590DA0" stroke-width="2.5"/>
  <path d="M 162 166 L 172 152 L 210 152" fill="none" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="171" y1="178" x2="202" y2="178" stroke="#590DA0" stroke-width="1.5"/>
  <line x1="171" y1="189" x2="202" y2="189" stroke="#590DA0" stroke-width="1.5"/>
  <line x1="171" y1="200" x2="189" y2="200" stroke="#590DA0" stroke-width="1.5"/>
  <text x="210" y="162" font-family="Inter,Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#590DA0">z</text>
  <text x="218" y="153" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#590DA0">z</text>
  <text x="226" y="144" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#590DA0">Z</text>

  <!-- Divider -->
  <line x1="95" y1="228" x2="295" y2="228" stroke="#590DA0" stroke-width="0.75" stroke-opacity="0.30"/>

  <text x="195" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Plan liegt ungelesen</text>
  <text x="195" y="268" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">im SharePoint</text>
  <text x="195" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Einmal erstellt, abgeheftet,</text>
  <text x="195" y="309" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">vergessen. Niemand kennt</text>
  <text x="195" y="325" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">ihn, wenn es zählt.</text>

  <!-- Arrow 1→2 -->
  <line x1="319" y1="236" x2="338" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="338,229 338,243 352,236" fill="#1A1A2E"/>

  <!-- ═══════════════════════════════════════════════
       CARD 2: IT-Fokus statt Business-Fokus
       ═══════════════════════════════════════════════ -->
  <rect x="345" y="84" width="240" height="300" rx="12" fill="#EDFAFA" stroke="#61D2CE" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="345" y="84" width="240" height="52" fill="#3DB5B1" clip-path="url(#c2)"/>
  <circle cx="465" cy="110" r="20" fill="#1A1A2E"/>
  <text x="465" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text>

  <!-- Server stack icon -->
  <rect x="422" y="153" width="34" height="13" rx="3" fill="#D0F5F4" stroke="#3DB5B1" stroke-width="2"/>
  <rect x="422" y="170" width="34" height="13" rx="3" fill="#D0F5F4" stroke="#3DB5B1" stroke-width="2"/>
  <rect x="422" y="187" width="34" height="13" rx="3" fill="#D0F5F4" stroke="#3DB5B1" stroke-width="2"/>
  <circle cx="429" cy="159.5" r="3" fill="#3DB5B1"/>
  <circle cx="429" cy="176.5" r="3" fill="#3DB5B1"/>
  <circle cx="429" cy="193.5" r="3" fill="#3DB5B1"/>
  <!-- ≠ symbol -->
  <text x="461" y="180" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="22" font-weight="700" fill="#3DB5B1">≠</text>
  <!-- Store/building -->
  <rect x="476" y="160" width="26" height="21" rx="2" fill="#D0F5F4" stroke="#3DB5B1" stroke-width="2"/>
  <line x1="469" y1="181" x2="508" y2="181" stroke="#3DB5B1" stroke-width="1.5"/>
  <line x1="489" y1="181" x2="489" y2="204" stroke="#3DB5B1" stroke-width="1.5"/>

  <line x1="365" y1="228" x2="565" y2="228" stroke="#61D2CE" stroke-width="0.75" stroke-opacity="0.45"/>

  <text x="465" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">IT-Fokus statt</text>
  <text x="465" y="268" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Business-Fokus</text>
  <text x="465" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">RTO löst kein</text>
  <text x="465" y="309" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Kundenproblem.</text>
  <text x="465" y="325" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Prozesse schon.</text>

  <!-- Arrow 2→3 -->
  <line x1="589" y1="236" x2="608" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="608,229 608,243 622,236" fill="#1A1A2E"/>

  <!-- ═══════════════════════════════════════════════
       CARD 3: Backups werden nie getestet
       ═══════════════════════════════════════════════ -->
  <rect x="615" y="84" width="240" height="300" rx="12" fill="#F9F5FF" stroke="#590DA0" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="615" y="84" width="240" height="52" fill="#590DA0" clip-path="url(#c3)"/>
  <circle cx="735" cy="110" r="20" fill="#1A1A2E"/>
  <text x="735" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text>

  <!-- Cloud with X icon (broken backup) -->
  <path d="M 720 172 Q 708 172 708 162 Q 708 151 720 151 Q 722 142 733 142 Q 745 142 747 152 Q 756 150 757 159 Q 759 172 748 172 Z" fill="#EDE2FF" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="712" y1="149" x2="753" y2="172" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="753" y1="149" x2="712" y2="172" stroke="#590DA0" stroke-width="2.5"/>
  <!-- Lock-open hint below -->
  <rect x="724" y="181" width="22" height="16" rx="3" fill="#EDE2FF" stroke="#590DA0" stroke-width="1.5"/>
  <path d="M 726 181 Q 726 172 735 172 Q 744 172 744 181" fill="none" stroke="#590DA0" stroke-width="1.5"/>

  <line x1="635" y1="228" x2="835" y2="228" stroke="#590DA0" stroke-width="0.75" stroke-opacity="0.30"/>

  <text x="735" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Backups werden</text>
  <text x="735" y="268" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">nie getestet</text>
  <text x="735" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Im Ernstfall stellt sich</text>
  <text x="735" y="309" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">heraus: nicht wieder-</text>
  <text x="735" y="325" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">herstellbar.</text>

  <!-- Arrow 3→4 -->
  <line x1="859" y1="236" x2="878" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="878,229 878,243 892,236" fill="#1A1A2E"/>

  <!-- ═══════════════════════════════════════════════
       CARD 4: Pläne veralten zu schnell (featured, solid teal fill)
       ═══════════════════════════════════════════════ -->
  <rect x="885" y="84" width="240" height="300" rx="12" fill="#61D2CE" filter="url(#cs)"/>
  <!-- Slightly darker header band for the solid teal card -->
  <rect x="885" y="84" width="240" height="52" fill="#3DB5B1" clip-path="url(#c4)"/>
  <circle cx="1005" cy="110" r="20" fill="#1A1A2E"/>
  <text x="1005" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">4</text>

  <!-- Calendar with X / outdated icon -->
  <rect x="978" y="143" width="54" height="50" rx="4" fill="rgba(255,255,255,0.4)" stroke="#1A1A2E" stroke-width="2.5"/>
  <line x1="978" y1="156" x2="1032" y2="156" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="992" y1="137" x2="992" y2="152" stroke="#1A1A2E" stroke-width="2.5"/>
  <line x1="1018" y1="137" x2="1018" y2="152" stroke="#1A1A2E" stroke-width="2.5"/>
  <text x="993" y="172" font-family="Inter,Arial,Helvetica,sans-serif" font-size="9" fill="#1A1A2E" font-weight="700">2022</text>
  <!-- X over old date -->
  <line x1="984" y1="178" x2="1028" y2="190" stroke="#1A1A2E" stroke-width="2.5"/>
  <line x1="1028" y1="178" x2="984" y2="190" stroke="#1A1A2E" stroke-width="2.5"/>

  <line x1="905" y1="228" x2="1105" y2="228" stroke="#1A5A5A" stroke-width="0.75" stroke-opacity="0.40"/>

  <text x="1005" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Pläne veralten</text>
  <text x="1005" y="268" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">zu schnell</text>
  <text x="1005" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#1A5A5A">Cloud-Migrationen,</text>
  <text x="1005" y="309" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#1A5A5A">neue Lieferanten, neue</text>
  <text x="1005" y="325" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#1A5A5A">Teams. Plan: unverändert.</text>

  <!-- Handwritten annotation with curved arrow pointing to Card 1 -->
  <path d="M 248 440 Q 218 420 178 406 Q 152 395 132 388" stroke="#590DA0" stroke-width="2" fill="none"/>
  <polygon points="126,382 137,389 128,397" fill="#590DA0"/>
  <text x="258" y="440" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-style="italic" fill="#590DA0">Hier beginnt das Problem:</text>
  <text x="258" y="461" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-style="italic" fill="#590DA0">der Plan, den niemand kennt</text>

  <!-- Footer -->
  <text x="600" y="618" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#9A9AB0">odcus.com</text>
</svg>
