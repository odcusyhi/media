<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#61D2CE"/>
      <stop offset="55%" stop-color="#8719E1"/>
      <stop offset="100%" stop-color="#590DA0"/>
    </linearGradient>
    <filter id="cs" x="-6%" y="-6%" width="112%" height="118%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#1A1A2E" flood-opacity="0.09"/>
    </filter>
    <clipPath id="c1"><rect x="75" y="84" width="240" height="300" rx="12"/></clipPath>
    <clipPath id="c2"><rect x="345" y="84" width="240" height="300" rx="12"/></clipPath>
    <clipPath id="c3"><rect x="615" y="84" width="240" height="300" rx="12"/></clipPath>
    <clipPath id="c4"><rect x="885" y="84" width="240" height="300" rx="12"/></clipPath>
  </defs>

  <rect width="1200" height="630" fill="#F8F7FF" rx="12"/>
  <text x="600" y="50" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="26" font-weight="700" fill="#1A1A2E">Die 4 KI-Readiness-Reifegrade</text>
  <rect x="0" y="64" width="1200" height="6" fill="url(#hdr)"/>

  <!-- CARD 1: Entdecker — purple -->
  <rect x="75" y="84" width="240" height="300" rx="12" fill="#F9F5FF" stroke="#590DA0" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="75" y="84" width="240" height="52" fill="#590DA0" clip-path="url(#c1)"/>
  <circle cx="195" cy="110" r="20" fill="#1A1A2E"/>
  <text x="195" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
  <!-- Binoculars icon with fill -->
  <circle cx="177" cy="165" r="19" fill="#EDE2FF" stroke="#590DA0" stroke-width="2.5"/>
  <circle cx="213" cy="165" r="19" fill="#EDE2FF" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="186" y1="160" x2="204" y2="160" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="177" y1="184" x2="177" y2="194" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="213" y1="184" x2="213" y2="194" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="177" y1="194" x2="213" y2="194" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="95" y1="228" x2="295" y2="228" stroke="#590DA0" stroke-width="0.75" stroke-opacity="0.30"/>
  <text x="195" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Entdecker</text>
  <text x="195" y="268" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" font-style="italic" fill="#6A4A9A">15–30 Punkte</text>
  <text x="195" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Fundamente fehlen.</text>
  <text x="195" y="309" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Starte mit Data-Governance</text>
  <text x="195" y="325" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">und Skills-Grundlagen.</text>

  <!-- Arrow 1→2 -->
  <line x1="319" y1="236" x2="338" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="338,229 338,243 352,236" fill="#1A1A2E"/>

  <!-- CARD 2: Einsteiger — teal -->
  <rect x="345" y="84" width="240" height="300" rx="12" fill="#EDFAFA" stroke="#61D2CE" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="345" y="84" width="240" height="52" fill="#3DB5B1" clip-path="url(#c2)"/>
  <circle cx="465" cy="110" r="20" fill="#1A1A2E"/>
  <text x="465" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
  <!-- Ascending bars with fills -->
  <rect x="432" y="183" width="18" height="22" rx="3" fill="#D0F5F4" stroke="#3DB5B1" stroke-width="2"/>
  <rect x="455" y="162" width="18" height="43" rx="3" fill="#D0F5F4" stroke="#3DB5B1" stroke-width="2"/>
  <rect x="478" y="143" width="18" height="62" rx="3" fill="#61D2CE" stroke="#3DB5B1" stroke-width="2"/>
  <!-- Upward arrow above tallest bar -->
  <line x1="487" y1="138" x2="487" y2="128" stroke="#3DB5B1" stroke-width="2.5"/>
  <polygon points="481,138 487,126 493,138" fill="#3DB5B1"/>
  <line x1="365" y1="228" x2="565" y2="228" stroke="#61D2CE" stroke-width="0.75" stroke-opacity="0.45"/>
  <text x="465" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Einsteiger</text>
  <text x="465" y="268" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" font-style="italic" fill="#2A8A86">31–45 Punkte</text>
  <text x="465" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Grundlagen vorhanden.</text>
  <text x="465" y="309" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Lücken schliessen und</text>
  <text x="465" y="325" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">erste Piloten starten.</text>

  <!-- Arrow 2→3 -->
  <line x1="589" y1="236" x2="608" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="608,229 608,243 622,236" fill="#1A1A2E"/>

  <!-- CARD 3: Entwickler — purple -->
  <rect x="615" y="84" width="240" height="300" rx="12" fill="#F9F5FF" stroke="#590DA0" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="615" y="84" width="240" height="52" fill="#590DA0" clip-path="url(#c3)"/>
  <circle cx="735" cy="110" r="20" fill="#1A1A2E"/>
  <text x="735" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
  <!-- Gear icon with fill -->
  <circle cx="735" cy="165" r="24" fill="#EDE2FF" stroke="#590DA0" stroke-width="2.5"/>
  <circle cx="735" cy="165" r="10" fill="#F9F5FF" stroke="#590DA0" stroke-width="2"/>
  <line x1="735" y1="138" x2="735" y2="131" stroke="#590DA0" stroke-width="5"/>
  <line x1="735" y1="192" x2="735" y2="199" stroke="#590DA0" stroke-width="5"/>
  <line x1="708" y1="165" x2="701" y2="165" stroke="#590DA0" stroke-width="5"/>
  <line x1="762" y1="165" x2="769" y2="165" stroke="#590DA0" stroke-width="5"/>
  <line x1="716" y1="146" x2="711" y2="141" stroke="#590DA0" stroke-width="4"/>
  <line x1="756" y1="184" x2="761" y2="189" stroke="#590DA0" stroke-width="4"/>
  <line x1="754" y1="146" x2="759" y2="141" stroke="#590DA0" stroke-width="4"/>
  <line x1="714" y1="184" x2="709" y2="189" stroke="#590DA0" stroke-width="4"/>
  <line x1="635" y1="228" x2="835" y2="228" stroke="#590DA0" stroke-width="0.75" stroke-opacity="0.30"/>
  <text x="735" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Entwickler</text>
  <text x="735" y="268" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" font-style="italic" fill="#6A4A9A">46–60 Punkte</text>
  <text x="735" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Gute Ausgangslage.</text>
  <text x="735" y="309" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Piloten mit messbarem</text>
  <text x="735" y="325" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Business Value starten.</text>

  <!-- Arrow 3→4 -->
  <line x1="859" y1="236" x2="878" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="878,229 878,243 892,236" fill="#1A1A2E"/>

  <!-- CARD 4: Vorreiter — solid teal fill -->
  <rect x="885" y="84" width="240" height="300" rx="12" fill="#61D2CE" filter="url(#cs)"/>
  <rect x="885" y="84" width="240" height="52" fill="#3DB5B1" clip-path="url(#c4)"/>
  <circle cx="1005" cy="110" r="20" fill="#1A1A2E"/>
  <text x="1005" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
  <!-- Star icon with fill -->
  <polygon points="1005,135 1013,157 1036,157 1018,171 1025,193 1005,179 985,193 992,171 974,157 997,157" fill="rgba(255,255,255,0.45)" stroke="#1A1A2E" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="905" y1="228" x2="1105" y2="228" stroke="#1A5A5A" stroke-width="0.75" stroke-opacity="0.40"/>
  <text x="1005" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Vorreiter</text>
  <text x="1005" y="268" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" font-style="italic" fill="#1A5A5A">61–75 Punkte</text>
  <text x="1005" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#1A5A5A">Starke Position.</text>
  <text x="1005" y="309" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#1A5A5A">Skalieren und Center</text>
  <text x="1005" y="325" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#1A5A5A">of Excellence aufbauen.</text>

  <!-- Annotation -->
  <path d="M 328 440 Q 300 420 270 408 Q 248 398 235 392" stroke="#590DA0" stroke-width="2" fill="none"/>
  <polygon points="229,386 240,393 231,401" fill="#590DA0"/>
  <text x="338" y="440" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-style="italic" fill="#590DA0">Hier starten die meisten</text>
  <text x="338" y="461" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-style="italic" fill="#590DA0">Schweizer KMU</text>

  <text x="600" y="618" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#9A9AB0">odcus.com</text>
</svg>
