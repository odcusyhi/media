<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520">
  <rect width="1200" height="520" fill="#FFFFFF" rx="12"/>

  <!-- Title -->
  <text x="600" y="46" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="24" font-weight="700" fill="#1A1A2E">Die 4 KI-Readiness-Reifegrade</text>

  <!-- CARD 1: Entdecker — purple border -->
  <rect x="55" y="72" width="252" height="258" rx="14" fill="#FFFFFF" stroke="#590DA0" stroke-width="4"/>
  <circle cx="181" cy="85" r="18" fill="#1A1A2E"/>
  <text x="181" y="92" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
  <!-- Binoculars icon -->
  <circle cx="163" cy="132" r="17" fill="none" stroke="#590DA0" stroke-width="2.5"/>
  <circle cx="199" cy="132" r="17" fill="none" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="172" y1="127" x2="190" y2="127" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="163" y1="149" x2="163" y2="158" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="199" y1="149" x2="199" y2="158" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="163" y1="158" x2="199" y2="158" stroke="#590DA0" stroke-width="2.5"/>
  <text x="181" y="202" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Entdecker</text>
  <text x="181" y="218" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" font-style="italic" fill="#4A4A6A">15&#8211;30 Punkte</text>
  <text x="181" y="242" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Fundamente fehlen.</text>
  <text x="181" y="258" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Starte mit Data-Governance</text>
  <text x="181" y="274" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">und Skills-Grundlagen.</text>

  <!-- Arrow 1 to 2 -->
  <line x1="312" y1="201" x2="322" y2="201" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="322,194 322,208 336,201" fill="#1A1A2E"/>

  <!-- CARD 2: Einsteiger — teal border -->
  <rect x="331" y="72" width="252" height="258" rx="14" fill="#FFFFFF" stroke="#61D2CE" stroke-width="4"/>
  <circle cx="457" cy="85" r="18" fill="#1A1A2E"/>
  <text x="457" y="92" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
  <!-- Ascending bars icon (3 bars growing left to right) -->
  <rect x="430" y="150" width="18" height="18" rx="2" fill="none" stroke="#61D2CE" stroke-width="2.5"/>
  <rect x="448" y="132" width="18" height="36" rx="2" fill="none" stroke="#61D2CE" stroke-width="2.5"/>
  <rect x="466" y="112" width="18" height="56" rx="2" fill="none" stroke="#61D2CE" stroke-width="2.5"/>
  <!-- Arrow up above tallest bar -->
  <line x1="475" y1="107" x2="475" y2="100" stroke="#61D2CE" stroke-width="2.5"/>
  <polygon points="469,107 475,99 481,107" fill="#61D2CE"/>
  <text x="457" y="202" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Einsteiger</text>
  <text x="457" y="218" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" font-style="italic" fill="#4A4A6A">31&#8211;45 Punkte</text>
  <text x="457" y="242" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Grundlagen vorhanden.</text>
  <text x="457" y="258" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Lücken schliessen und</text>
  <text x="457" y="274" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">erste Piloten starten.</text>

  <!-- Arrow 2 to 3 -->
  <line x1="588" y1="201" x2="598" y2="201" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="598,194 598,208 612,201" fill="#1A1A2E"/>

  <!-- CARD 3: Entwickler — purple border -->
  <rect x="607" y="72" width="252" height="258" rx="14" fill="#FFFFFF" stroke="#590DA0" stroke-width="4"/>
  <circle cx="733" cy="85" r="18" fill="#1A1A2E"/>
  <text x="733" y="92" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
  <!-- Gear icon: outer ring + inner ring + 8 teeth -->
  <circle cx="733" cy="133" r="20" fill="none" stroke="#590DA0" stroke-width="2.5"/>
  <circle cx="733" cy="133" r="9" fill="none" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="733" y1="109" x2="733" y2="103" stroke="#590DA0" stroke-width="5"/>
  <line x1="733" y1="163" x2="733" y2="157" stroke="#590DA0" stroke-width="5"/>
  <line x1="709" y1="133" x2="703" y2="133" stroke="#590DA0" stroke-width="5"/>
  <line x1="763" y1="133" x2="757" y2="133" stroke="#590DA0" stroke-width="5"/>
  <line x1="716" y1="116" x2="712" y2="112" stroke="#590DA0" stroke-width="4"/>
  <line x1="754" y1="154" x2="750" y2="150" stroke="#590DA0" stroke-width="4"/>
  <line x1="750" y1="116" x2="754" y2="112" stroke="#590DA0" stroke-width="4"/>
  <line x1="712" y1="154" x2="716" y2="150" stroke="#590DA0" stroke-width="4"/>
  <text x="733" y="202" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Entwickler</text>
  <text x="733" y="218" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" font-style="italic" fill="#4A4A6A">46&#8211;60 Punkte</text>
  <text x="733" y="242" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Gute Ausgangslage.</text>
  <text x="733" y="258" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Piloten mit messbarem</text>
  <text x="733" y="274" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#4A4A6A">Business Value starten.</text>

  <!-- Arrow 3 to 4 -->
  <line x1="864" y1="201" x2="874" y2="201" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="874,194 874,208 888,201" fill="#1A1A2E"/>

  <!-- CARD 4: Vorreiter — solid teal fill -->
  <rect x="883" y="72" width="252" height="258" rx="14" fill="#61D2CE"/>
  <circle cx="1009" cy="85" r="18" fill="#1A1A2E"/>
  <text x="1009" y="92" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
  <!-- Star icon (5-pointed) -->
  <polygon points="1009,102 1016,121 1036,121 1020,134 1026,153 1009,141 992,153 998,134 982,121 1002,121" fill="none" stroke="#1A1A2E" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="1009" y="202" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Vorreiter</text>
  <text x="1009" y="218" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" font-style="italic" fill="#1A5A5A">61&#8211;75 Punkte</text>
  <text x="1009" y="242" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#1A5A5A">Starke Position.</text>
  <text x="1009" y="258" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#1A5A5A">Skalieren und Center</text>
  <text x="1009" y="274" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11.5" fill="#1A5A5A">of Excellence aufbauen.</text>

  <!-- Handwritten annotation pointing to gap between cards 1 and 2 -->
  <path d="M 328 390 Q 322 372 320 352 Q 319 335 319 320 Q 319 290 319 270 Q 319 245 319 232" stroke="#590DA0" stroke-width="2" fill="none"/>
  <polygon points="313,234 319,222 325,234" fill="#590DA0"/>
  <text x="338" y="390" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-style="italic" fill="#590DA0">Hier starten die meisten</text>
  <text x="338" y="411" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-style="italic" fill="#590DA0">Schweizer KMU</text>

  <!-- Footer -->
  <text x="600" y="506" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#9A9AB0">odcus.com</text>
</svg>
