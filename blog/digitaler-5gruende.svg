<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#61D2CE"/>
      <stop offset="55%" stop-color="#8719E1"/>
      <stop offset="100%" stop-color="#590DA0"/>
    </linearGradient>
    <filter id="cs" x="-6%" y="-6%" width="112%" height="118%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#1A1A2E" flood-opacity="0.09"/>
    </filter>
    <clipPath id="c1"><rect x="86" y="84" width="188" height="300" rx="12"/></clipPath>
    <clipPath id="c2"><rect x="296" y="84" width="188" height="300" rx="12"/></clipPath>
    <clipPath id="c3"><rect x="506" y="84" width="188" height="300" rx="12"/></clipPath>
    <clipPath id="c4"><rect x="716" y="84" width="188" height="300" rx="12"/></clipPath>
    <clipPath id="c5"><rect x="926" y="84" width="188" height="300" rx="12"/></clipPath>
  </defs>

  <rect width="1200" height="630" fill="#F8F7FF" rx="12"/>
  <text x="600" y="50" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="24" font-weight="700" fill="#1A1A2E">5 Gründe warum digitale Transformation scheitert</text>
  <rect x="0" y="64" width="1200" height="6" fill="url(#hdr)"/>

  <!-- CARD 1: Technologie zuerst — purple -->
  <rect x="86" y="84" width="188" height="300" rx="12" fill="#F9F5FF" stroke="#590DA0" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="86" y="84" width="188" height="52" fill="#590DA0" clip-path="url(#c1)"/>
  <circle cx="180" cy="110" r="20" fill="#1A1A2E"/>
  <text x="180" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
  <!-- Monitor with X -->
  <rect x="146" y="149" width="68" height="48" rx="4" fill="#EDE2FF" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="146" y1="183" x2="214" y2="183" stroke="#590DA0" stroke-width="1.5"/>
  <rect x="163" y="197" width="34" height="7" rx="2" fill="#EDE2FF" stroke="#590DA0" stroke-width="1.5"/>
  <line x1="155" y1="157" x2="205" y2="175" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="205" y1="157" x2="155" y2="175" stroke="#590DA0" stroke-width="2.5"/>
  <line x1="106" y1="228" x2="254" y2="228" stroke="#590DA0" stroke-width="0.75" stroke-opacity="0.30"/>
  <text x="180" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Technologie</text>
  <text x="180" y="267" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">zuerst</text>
  <text x="180" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Tools kaufen, bevor</text>
  <text x="180" y="308" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">das Problem klar</text>
  <text x="180" y="323" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">definiert ist.</text>

  <!-- Arrow 1→2 -->
  <line x1="278" y1="236" x2="289" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="289,229 289,243 303,236" fill="#1A1A2E"/>

  <!-- CARD 2: Change Management vergessen — teal -->
  <rect x="296" y="84" width="188" height="300" rx="12" fill="#EDFAFA" stroke="#61D2CE" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="296" y="84" width="188" height="52" fill="#3DB5B1" clip-path="url(#c2)"/>
  <circle cx="390" cy="110" r="20" fill="#1A1A2E"/>
  <text x="390" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
  <!-- Book/manual with bookmark -->
  <rect x="358" y="149" width="64" height="70" rx="4" fill="#D0F5F4" stroke="#3DB5B1" stroke-width="2.5"/>
  <line x1="358" y1="163" x2="422" y2="163" stroke="#3DB5B1" stroke-width="1.5"/>
  <line x1="366" y1="174" x2="414" y2="174" stroke="#3DB5B1" stroke-width="1.5"/>
  <line x1="366" y1="184" x2="414" y2="184" stroke="#3DB5B1" stroke-width="1.5"/>
  <line x1="366" y1="194" x2="396" y2="194" stroke="#3DB5B1" stroke-width="1.5"/>
  <rect x="380" y="141" width="16" height="18" rx="2" fill="#3DB5B1"/>
  <line x1="316" y1="228" x2="464" y2="228" stroke="#61D2CE" stroke-width="0.75" stroke-opacity="0.45"/>
  <text x="390" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#1A1A2E">Change</text>
  <text x="390" y="267" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#1A1A2E">Management</text>
  <text x="390" y="283" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#1A1A2E">vergessen</text>
  <text x="390" y="305" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Menschen brauchen</text>
  <text x="390" y="320" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Begleitung, kein</text>
  <text x="390" y="335" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Passwort-E-Mail.</text>

  <!-- Arrow 2→3 -->
  <line x1="488" y1="236" x2="499" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="499,229 499,243 513,236" fill="#1A1A2E"/>

  <!-- CARD 3: Diffuse Ziele — purple -->
  <rect x="506" y="84" width="188" height="300" rx="12" fill="#F9F5FF" stroke="#590DA0" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="506" y="84" width="188" height="52" fill="#590DA0" clip-path="url(#c3)"/>
  <circle cx="600" cy="110" r="20" fill="#1A1A2E"/>
  <text x="600" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
  <!-- Dashed target with ? -->
  <circle cx="600" cy="170" r="30" fill="none" stroke="#590DA0" stroke-width="2" stroke-dasharray="6,4"/>
  <circle cx="600" cy="170" r="19" fill="#EDE2FF" stroke="#590DA0" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="600" cy="170" r="10" fill="#EDE2FF" stroke="#590DA0" stroke-width="2"/>
  <text x="600" y="176" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="16" font-weight="700" fill="#590DA0">?</text>
  <line x1="526" y1="228" x2="674" y2="228" stroke="#590DA0" stroke-width="0.75" stroke-opacity="0.30"/>
  <text x="600" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Diffuse</text>
  <text x="600" y="267" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Ziele</text>
  <text x="600" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">"Digitaler werden"</text>
  <text x="600" y="308" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">ist keine messbare</text>
  <text x="600" y="323" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Zielvorgabe.</text>

  <!-- Arrow 3→4 -->
  <line x1="698" y1="236" x2="709" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="709,229 709,243 723,236" fill="#1A1A2E"/>

  <!-- CARD 4: Silos überall — teal -->
  <rect x="716" y="84" width="188" height="300" rx="12" fill="#EDFAFA" stroke="#61D2CE" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="716" y="84" width="188" height="52" fill="#3DB5B1" clip-path="url(#c4)"/>
  <circle cx="810" cy="110" r="20" fill="#1A1A2E"/>
  <text x="810" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
  <!-- Two silos with dashed barrier -->
  <rect x="738" y="147" width="44" height="60" rx="4" fill="#D0F5F4" stroke="#3DB5B1" stroke-width="2"/>
  <rect x="838" y="147" width="44" height="60" rx="4" fill="#D0F5F4" stroke="#3DB5B1" stroke-width="2"/>
  <text x="760" y="171" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="9" font-weight="700" fill="#3DB5B1">IT</text>
  <text x="760" y="183" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="8" fill="#3DB5B1">Abt.</text>
  <text x="860" y="171" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="9" font-weight="700" fill="#3DB5B1">BIZ</text>
  <text x="860" y="183" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="8" fill="#3DB5B1">Abt.</text>
  <line x1="810" y1="137" x2="810" y2="215" stroke="#3DB5B1" stroke-width="3" stroke-dasharray="7,5"/>
  <line x1="736" y1="228" x2="884" y2="228" stroke="#61D2CE" stroke-width="0.75" stroke-opacity="0.45"/>
  <text x="810" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Silos</text>
  <text x="810" y="267" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">überall</text>
  <text x="810" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">IT und Business</text>
  <text x="810" y="308" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">arbeiten in getrennten</text>
  <text x="810" y="323" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Welten.</text>

  <!-- Arrow 4→5 -->
  <line x1="908" y1="236" x2="919" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="919,229 919,243 933,236" fill="#1A1A2E"/>

  <!-- CARD 5: Unrealistische Timelines — solid teal fill -->
  <rect x="926" y="84" width="188" height="300" rx="12" fill="#61D2CE" filter="url(#cs)"/>
  <rect x="926" y="84" width="188" height="52" fill="#3DB5B1" clip-path="url(#c5)"/>
  <circle cx="1020" cy="110" r="20" fill="#1A1A2E"/>
  <text x="1020" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">5</text>
  <!-- Hourglass icon -->
  <path d="M998 149 L1042 149 L1020 177 L1042 205 L998 205 L1020 177 Z" fill="rgba(255,255,255,0.35)" stroke="#1A1A2E" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="998" y1="149" x2="1042" y2="149" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="998" y1="205" x2="1042" y2="205" stroke="#1A1A2E" stroke-width="2"/>
  <path d="M1008 198 Q1020 192 1032 198 L1032 205 L1008 205 Z" fill="rgba(26,26,46,0.3)"/>
  <line x1="1010" y1="159" x2="1030" y2="171" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="1030" y1="159" x2="1010" y2="171" stroke="#1A1A2E" stroke-width="2"/>
  <line x1="946" y1="228" x2="1094" y2="228" stroke="#1A5A5A" stroke-width="0.75" stroke-opacity="0.40"/>
  <text x="1020" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Unrealistische</text>
  <text x="1020" y="267" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Timelines</text>
  <text x="1020" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#1A5A5A">"6 Monate komplett</text>
  <text x="1020" y="308" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#1A5A5A">transformiert" endet</text>
  <text x="1020" y="323" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#1A5A5A">in Frustration.</text>

  <!-- Annotation -->
  <path d="M 218 440 Q 185 420 158 405 Q 138 394 122 387" stroke="#590DA0" stroke-width="2" fill="none"/>
  <polygon points="116,381 127,388 118,396" fill="#590DA0"/>
  <text x="228" y="440" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-style="italic" fill="#590DA0">Tritt am häufigsten auf:</text>
  <text x="228" y="461" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-style="italic" fill="#590DA0">die Lösung kommt vor dem Problem</text>

  <text x="600" y="618" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#9A9AB0">odcus.com</text>
</svg>
