<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#61D2CE"/>
      <stop offset="55%" stop-color="#8719E1"/>
      <stop offset="100%" stop-color="#590DA0"/>
    </linearGradient>
    <filter id="cs" x="-6%" y="-6%" width="112%" height="118%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#1A1A2E" flood-opacity="0.09"/>
    </filter>
    <clipPath id="c1"><rect x="86" y="84" width="188" height="300" rx="12"/></clipPath>
    <clipPath id="c2"><rect x="296" y="84" width="188" height="300" rx="12"/></clipPath>
    <clipPath id="c3"><rect x="506" y="84" width="188" height="300" rx="12"/></clipPath>
    <clipPath id="c4"><rect x="716" y="84" width="188" height="300" rx="12"/></clipPath>
    <clipPath id="c5"><rect x="926" y="84" width="188" height="300" rx="12"/></clipPath>
  </defs>

  <rect width="1200" height="630" fill="#F8F7FF" rx="12"/>
  <text x="600" y="50" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="24" font-weight="700" fill="#1A1A2E">Der 5-Schritte-Plan für Lieferanten-Sicherheit</text>
  <rect x="0" y="64" width="1200" height="6" fill="url(#hdr)"/>

  <!-- CARD 1: Inventar erstellen — purple -->
  <rect x="86" y="84" width="188" height="300" rx="12" fill="#F9F5FF" stroke="#590DA0" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="86" y="84" width="188" height="52" fill="#590DA0" clip-path="url(#c1)"/>
  <circle cx="180" cy="110" r="20" fill="#1A1A2E"/>
  <text x="180" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
  <!-- Clipboard with fill -->
  <rect x="152" y="152" width="56" height="68" rx="4" fill="#EDE2FF" stroke="#590DA0" stroke-width="2.5"/>
  <rect x="164" y="145" width="32" height="15" rx="4" fill="#590DA0"/>
  <line x1="160" y1="178" x2="200" y2="178" stroke="#590DA0" stroke-width="2"/>
  <line x1="160" y1="191" x2="200" y2="191" stroke="#590DA0" stroke-width="2"/>
  <line x1="160" y1="204" x2="182" y2="204" stroke="#590DA0" stroke-width="2"/>
  <line x1="106" y1="228" x2="254" y2="228" stroke="#590DA0" stroke-width="0.75" stroke-opacity="0.30"/>
  <text x="180" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Inventar</text>
  <text x="180" y="267" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">erstellen</text>
  <text x="180" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Alle Drittanbieter mit</text>
  <text x="180" y="308" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Systemzugang erfassen</text>
  <text x="180" y="323" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">und priorisieren.</text>

  <!-- Arrow 1→2 -->
  <line x1="278" y1="236" x2="289" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="289,229 289,243 303,236" fill="#1A1A2E"/>

  <!-- CARD 2: Vendor Risk Assessment — teal -->
  <rect x="296" y="84" width="188" height="300" rx="12" fill="#EDFAFA" stroke="#61D2CE" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="296" y="84" width="188" height="52" fill="#3DB5B1" clip-path="url(#c2)"/>
  <circle cx="390" cy="110" r="20" fill="#1A1A2E"/>
  <text x="390" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
  <!-- Shield with checkmark + fill -->
  <path d="M390 149 L418 160 L418 185 Q418 204 390 216 Q362 204 362 185 L362 160 Z" fill="#D0F5F4" stroke="#3DB5B1" stroke-width="2.5"/>
  <polyline points="376,184 385,195 408,172" stroke="#3DB5B1" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="316" y1="228" x2="464" y2="228" stroke="#61D2CE" stroke-width="0.75" stroke-opacity="0.45"/>
  <text x="390" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Vendor Risk</text>
  <text x="390" y="267" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Assessment</text>
  <text x="390" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Anbieter nach Security-</text>
  <text x="390" y="308" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Reife, Verträgen und</text>
  <text x="390" y="323" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Abhängigkeit bewerten.</text>

  <!-- Arrow 2→3 -->
  <line x1="488" y1="236" x2="499" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="499,229 499,243 513,236" fill="#1A1A2E"/>

  <!-- CARD 3: Vertragliche Absicherung — purple -->
  <rect x="506" y="84" width="188" height="300" rx="12" fill="#F9F5FF" stroke="#590DA0" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="506" y="84" width="188" height="52" fill="#590DA0" clip-path="url(#c3)"/>
  <circle cx="600" cy="110" r="20" fill="#1A1A2E"/>
  <text x="600" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
  <!-- Document + seal with fill -->
  <rect x="572" y="149" width="56" height="70" rx="4" fill="#EDE2FF" stroke="#590DA0" stroke-width="2.5"/>
  <path d="M588 149 L588 143 Q588 138 600 138 Q612 138 612 143 L612 149" fill="#590DA0"/>
  <line x1="580" y1="171" x2="620" y2="171" stroke="#590DA0" stroke-width="1.5"/>
  <line x1="580" y1="184" x2="620" y2="184" stroke="#590DA0" stroke-width="1.5"/>
  <circle cx="600" cy="203" r="9" fill="#F9F5FF" stroke="#590DA0" stroke-width="2"/>
  <line x1="595" y1="203" x2="605" y2="203" stroke="#590DA0" stroke-width="1.5"/>
  <line x1="600" y1="198" x2="600" y2="208" stroke="#590DA0" stroke-width="1.5"/>
  <line x1="526" y1="228" x2="674" y2="228" stroke="#590DA0" stroke-width="0.75" stroke-opacity="0.30"/>
  <text x="600" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Vertragliche</text>
  <text x="600" y="267" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Absicherung</text>
  <text x="600" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Audit-Rechte, SLAs und</text>
  <text x="600" y="308" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Exit-Klauseln in</text>
  <text x="600" y="323" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Verträgen verankern.</text>

  <!-- Arrow 3→4 -->
  <line x1="698" y1="236" x2="709" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="709,229 709,243 723,236" fill="#1A1A2E"/>

  <!-- CARD 4: Monitoring aufbauen — teal -->
  <rect x="716" y="84" width="188" height="300" rx="12" fill="#EDFAFA" stroke="#61D2CE" stroke-width="1.5" filter="url(#cs)"/>
  <rect x="716" y="84" width="188" height="52" fill="#3DB5B1" clip-path="url(#c4)"/>
  <circle cx="810" cy="110" r="20" fill="#1A1A2E"/>
  <text x="810" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
  <!-- Radar / target with fills -->
  <circle cx="810" cy="178" r="36" fill="none" stroke="#3DB5B1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="810" cy="178" r="24" fill="#D0F5F4" stroke="#3DB5B1" stroke-width="2"/>
  <circle cx="810" cy="178" r="12" fill="#61D2CE" stroke="#3DB5B1" stroke-width="2"/>
  <circle cx="810" cy="178" r="4" fill="#1A1A2E"/>
  <!-- Warning triangle in corner -->
  <polygon points="828,156 838,174 818,174" fill="none" stroke="#3DB5B1" stroke-width="2"/>
  <line x1="828" y1="160" x2="828" y2="167" stroke="#3DB5B1" stroke-width="2"/>
  <circle cx="828" cy="171" r="1.5" fill="#3DB5B1"/>
  <line x1="736" y1="228" x2="884" y2="228" stroke="#61D2CE" stroke-width="0.75" stroke-opacity="0.45"/>
  <text x="810" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Monitoring</text>
  <text x="810" y="267" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">aufbauen</text>
  <text x="810" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Security-Ratings und</text>
  <text x="810" y="308" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">CVE-Alerts für kritische</text>
  <text x="810" y="323" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#4A4A6A">Lieferanten einrichten.</text>

  <!-- Arrow 4→5 -->
  <line x1="908" y1="236" x2="919" y2="236" stroke="#1A1A2E" stroke-width="3"/>
  <polygon points="919,229 919,243 933,236" fill="#1A1A2E"/>

  <!-- CARD 5: Incident Response planen — solid teal fill -->
  <rect x="926" y="84" width="188" height="300" rx="12" fill="#61D2CE" filter="url(#cs)"/>
  <rect x="926" y="84" width="188" height="52" fill="#3DB5B1" clip-path="url(#c5)"/>
  <circle cx="1020" cy="110" r="20" fill="#1A1A2E"/>
  <text x="1020" y="117" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">5</text>
  <!-- Alert / siren with fill -->
  <path d="M1020 149 Q1046 151 1048 178 L992 178 Q994 151 1020 149 Z" fill="rgba(255,255,255,0.4)" stroke="#1A1A2E" stroke-width="2.5"/>
  <rect x="1006" y="178" width="28" height="12" rx="2" fill="rgba(255,255,255,0.4)" stroke="#1A1A2E" stroke-width="2"/>
  <circle cx="1020" cy="200" r="8" fill="rgba(255,255,255,0.4)" stroke="#1A1A2E" stroke-width="2"/>
  <path d="M988 162 Q982 154 985 146" stroke="#1A1A2E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M1052 162 Q1058 154 1055 146" stroke="#1A1A2E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="946" y1="228" x2="1094" y2="228" stroke="#1A5A5A" stroke-width="0.75" stroke-opacity="0.40"/>
  <text x="1020" y="251" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Incident</text>
  <text x="1020" y="267" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="13.5" font-weight="700" fill="#1A1A2E">Response planen</text>
  <text x="1020" y="293" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#1A5A5A">Szenario 'Lieferant</text>
  <text x="1020" y="308" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#1A5A5A">kompromittiert' in</text>
  <text x="1020" y="323" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#1A5A5A">den IR-Plan aufnehmen.</text>

  <!-- Annotation -->
  <path d="M 218 440 Q 185 420 158 405 Q 138 394 122 387" stroke="#590DA0" stroke-width="2" fill="none"/>
  <polygon points="116,381 127,388 118,396" fill="#590DA0"/>
  <text x="228" y="440" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-style="italic" fill="#590DA0">Hier starten — die meisten</text>
  <text x="228" y="461" font-family="Georgia,'Times New Roman',serif" font-size="13.5" font-style="italic" fill="#590DA0">kennen ihre Lieferanten nicht</text>

  <text x="600" y="618" text-anchor="middle" font-family="Inter,Arial,Helvetica,sans-serif" font-size="11" fill="#9A9AB0">odcus.com</text>
</svg>
